name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/placeholder"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/placeholder"
          AUTH_SECRET: "ci-placeholder"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dreamers_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dreamers_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/dreamers_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dreamers_test
      AUTH_SECRET: ci-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test
